services:
  dashboard:
    build: .
    expose:
      - "3000"
    env_file:
      - .env.local
    volumes:
      - audit-logs:/app/logs
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - dashboard
    restart: unless-stopped

volumes:
  audit-logs:
    driver: local
